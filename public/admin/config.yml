backend:
  name: github
  repo: think2pad-qq/MountainRiverMusic
  branch: main
  base_url: https://decap-oauth-worker.2308057418.workers.dev

# 本地开发时可运行 `npx decap-cms-proxy-server`，再启用下面两行。
# local_backend: true
# proxy_url: http://localhost:8081/api/v1

media_folder: "public/images"
public_folder: "/MountainRiverMusic/images"

collections:
  - name: "works"
    label: "作品"
    label_singular: "作品"
    folder: "src/content/works"
    create: true
    delete: true
    format: "frontmatter"
    slug: "{{year}}-{{slug}}"
    summary: "{{title}} ({{year}})"
    sortable_fields: ["year", "title"]
    preview_path: "works/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "副标题", name: "subtitle", widget: "string", required: false }
      - { label: "年份", name: "year", widget: "number", value_type: "int" }
      - { label: "时长", name: "duration", widget: "string", hint: "例如 3:27" }
      - label: "风格标签"
        name: "style"
        widget: "list"
        field: { label: "标签", name: "tag", widget: "string" }
      - label: "封面图"
        name: "cover"
        widget: "image"
        media_folder: "public/images"
        public_folder: "/MountainRiverMusic/images"
        hint: "建议尺寸 1200x1200 或 16:9，JPEG/PNG"
      - label: "音频文件"
        name: "audio"
        widget: "file"
        media_folder: "public/audio"
        public_folder: "/MountainRiverMusic/audio"
        hint: "支持 .mp3 / .wav / .flac，也支持外部 URL"
        choose_url: true
      - { label: "展示在近期作品", name: "showOnHome", widget: "boolean", default: false, required: false }
      - { label: "设为首页封面", name: "useAsHeroCover", widget: "boolean", default: false, required: false }
      - { label: "设为首页播放器", name: "useAsHeroPlayer", widget: "boolean", default: false, required: false }
      - label: "外部链接"
        name: "externalLinks"
        widget: "object"
        required: false
        fields:
          - { label: "网易云音乐", name: "netease", widget: "string", required: false, hint: "网易云音乐作品页完整 URL" }
      - { label: "正文", name: "body", widget: "markdown", hint: "作品介绍、编曲思路、制作人员等" }
