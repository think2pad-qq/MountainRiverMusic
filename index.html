<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山川有乐 - 个人音乐站</title>
    <style>
        /* 这里是一点点简单的 CSS，让网页居中、变好看一点 */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 50px;
        }
        h1 { color: #333; }
        .music-player {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>🎵 山川有乐</h1>
    <p>欢迎来到我的个人音乐空间，这里分享我的原创音乐和故事。</p>

    <!-- 音乐播放器区域 -->
    <div class="music-player">
        <h3>当前播放：示例音乐</h3>
        <!-- HTML5 自带的播放器标签，src 里面放音乐的链接 -->
        <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
            您的浏览器不支持播放该音频。
        </audio>
    </div>

</body>
</html>
